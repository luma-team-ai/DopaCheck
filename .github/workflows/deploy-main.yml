name: Deploy to CloudType

# main 브랜치에 push될 때마다 CloudType에 자동 배포한다.
# 수동 실행도 가능하도록 workflow_dispatch 추가.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Secrets 미등록 상태에서 빈 값으로 배포돼 운영 앱이 죽는 사고를 막는 안전장치.
      # 필수 Secret이 하나라도 비어 있으면 명확한 메시지와 함께 즉시 실패한다.
      - name: Preflight — 필수 Secrets 확인
        run: |
          missing=()
          [ -z "${{ secrets.CLOUDTYPE_TOKEN }}" ] && missing+=("CLOUDTYPE_TOKEN")
          [ -z "${{ secrets.GHP_TOKEN }}" ] && missing+=("GHP_TOKEN")
          [ -z "${{ secrets.DB_PASSWORD }}" ] && missing+=("DB_PASSWORD")
          [ -z "${{ secrets.GOOGLE_CLIENT_ID }}" ] && missing+=("GOOGLE_CLIENT_ID")
          [ -z "${{ secrets.GOOGLE_CLIENT_SECRET }}" ] && missing+=("GOOGLE_CLIENT_SECRET")
          [ -z "${{ secrets.KAKAO_CLIENT_ID }}" ] && missing+=("KAKAO_CLIENT_ID")
          [ -z "${{ secrets.FLASK_SECRET_KEY }}" ] && missing+=("FLASK_SECRET_KEY")
          [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "${{ secrets.DB_HOST }}" ] && missing+=("DB_HOST")
          [ -z "${{ secrets.DB_PORT }}" ] && missing+=("DB_PORT")
          [ -z "${{ secrets.DB_NAME }}" ] && missing+=("DB_NAME")
          [ -z "${{ secrets.DB_USER }}" ] && missing+=("DB_USER")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::GitHub Secrets 미등록으로 배포를 중단합니다: ${missing[*]}"
            echo "Settings → Secrets and variables → Actions 에서 등록 후 이 워크플로를 재실행하세요."
            exit 1
          fi
          echo "✅ 필수 Secrets 모두 확인됨 — 배포 진행"

      - name: Connect deploy key
        uses: cloudtype-github-actions/connect@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          ghtoken: ${{ secrets.GHP_TOKEN }}

      - name: Deploy
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: rkqkdrn22/dopacheck
          stage: main
          # ⚠️ 시크릿은 절대 평문 금지 — 모두 GitHub Secrets(${{ secrets.* }})로 주입.
          # 공개 URL·비민감 값(redirect URI·PORT·FLASK_ENV)만 인라인 허용.
          yaml: |
            name: dopacheck
            app: python@3.11
            options:
              ports: "5000"
              start: gunicorn app:app --bind 0.0.0.0:$PORT
              env:
                - name: DB_HOST
                  value: ${{ secrets.DB_HOST }}
                - name: DB_PORT
                  value: ${{ secrets.DB_PORT }}
                - name: DB_NAME
                  value: ${{ secrets.DB_NAME }}
                - name: DB_USER
                  value: ${{ secrets.DB_USER }}
                - name: DB_PASSWORD
                  value: ${{ secrets.DB_PASSWORD }}
                - name: GOOGLE_CLIENT_ID
                  value: ${{ secrets.GOOGLE_CLIENT_ID }}
                - name: GOOGLE_CLIENT_SECRET
                  value: ${{ secrets.GOOGLE_CLIENT_SECRET }}
                - name: GOOGLE_REDIRECT_URI
                  value: "https://port-0-dopacheck-mqafbidjd67ecc7b.sel3.cloudtype.app/auth/google/callback"
                - name: KAKAO_CLIENT_ID
                  value: ${{ secrets.KAKAO_CLIENT_ID }}
                - name: KAKAO_REDIRECT_URI
                  value: "https://port-0-dopacheck-mqafbidjd67ecc7b.sel3.cloudtype.app/oauth2/code/kakao"
                - name: ANTHROPIC_API_KEY
                  value: ${{ secrets.ANTHROPIC_API_KEY }}
                - name: FLASK_SECRET_KEY
                  value: ${{ secrets.FLASK_SECRET_KEY }}
                - name: FLASK_ENV
                  value: "production"
                - name: PORT
                  value: "5000"
            context:
              git:
                url: git@github.com:${{ github.repository }}.git
                ref: ${{ github.ref }}
