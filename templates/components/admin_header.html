<!-- Admin Sub-page Header: max-w-[480px] inner wrapper so content aligns with page body on desktop -->
<header class="fixed top-0 w-full h-[56px] bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 shadow-sm z-50">
  <div class="max-w-[480px] mx-auto w-full h-full flex items-center justify-between px-5">
    <a href="/" class="flex items-center">
      <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="DopaCheck Logo" class="h-9 w-auto">
    </a>
    <div class="relative" id="profile-menu-wrapper">
      <div
        class="bg-error-container/20 px-3 py-1 rounded-full border border-error-container/30 active:scale-95 transition-transform cursor-pointer"
        id="profile-avatar-btn">
        <span class="text-[11px] font-bold text-error tracking-wider">ADMIN</span>
      </div>
      <div
        class="hidden absolute top-[calc(100%+8px)] right-0 w-[200px] bg-surface-container backdrop-blur-md border border-outline-variant/30 rounded-xl shadow-2xl z-[100] overflow-hidden flex flex-col"
        id="profile-dropdown">
        <div class="flex flex-col py-2">
          <a href="{{ url_for('auth.logout') }}"
            class="flex items-center gap-3 px-4 py-3 hover:bg-error/10 transition-colors">
            <span class="material-symbols-outlined text-error text-[20px]">logout</span>
            <span class="text-error text-sm">로그아웃</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</header>

<script>
  (function () {
    const btn = document.getElementById('profile-avatar-btn');
    const menu = document.getElementById('profile-dropdown');
    if (!btn || !menu) return;
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      menu.classList.toggle('hidden');
    });
    document.addEventListener('click', function (e) {
      if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.classList.add('hidden');
      }
    });
  })();
</script>
